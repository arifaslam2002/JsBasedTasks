<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="main-div"> 
 <div class="form-div">   
    <h3 class="title">Registration Form</h3>
    <form action="#">
        <input type="text" name="name" id="name" placeholder="Name"> <br>
        <input type="text" name="email" id="email" placeholder="Email" required> <br>
        <input type="text" name="phno" id="phno" placeholder="PhoneNumber" required> <br>
        <input type="text" name="course" id="course" placeholder="Course"> <br>
        <button type="submit" id="sbt-btn">Submit</button>
    </form></div>
    <h3 class="title2">Students Information Table</h3>
    <div>
        <table id="table">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone No</th>
                <th>Course</th>
            </tr>
        </table></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
