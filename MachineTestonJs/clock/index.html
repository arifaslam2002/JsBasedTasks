<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <h1 class="text-center text-8xl font-black text-yellow-500 underline  animate-pulse">Clock</h1>
    <div class="flex justify-center items-center mt-20" >
        <div class="animated-border p-1 rounded-3xl">
        <div class="bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 w-100 h-50  justify-center flex items-center rounded-2xl">
            <h1 class="text-5xl p-7 font-black" id="hour">0</h1><span class="text-5xl font-black">:</span>
            <h1 class="text-5xl p-7 font-black" id="min">0</h1><span class="text-5xl font-black">:</span>
            <h1 class="text-5xl p-7 font-black" id="sec">0</h1>
        </div>
        </div>
    <script src="script.js"></script>
</body>
</html>
